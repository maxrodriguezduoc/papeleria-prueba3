server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: productos-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/productos/**
                - Path=/api/v1/categorias/**
                - Path=/api/v1/marcas/**

            - id: locales-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/locales/**
                - Path=/api/v1/comunas/**
                - Path=/api/v1/regiones/**
                - Path=/api/v1/clientes/**

            - id: ventas-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/ventas/**
                - Path=/api/v1/pagos/**