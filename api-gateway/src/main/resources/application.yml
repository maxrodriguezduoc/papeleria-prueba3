server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: productos-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/productos/**
                - Path=/api/v1/categorias/**
                - Path=/api/v1/marcas/**

            - id: locales-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/locales/**
                - Path=/api/v1/comunas/**
                - Path=/api/v1/regiones/**
                - Path=/api/v1/clientes/**

            - id: ventas-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/ventas/**
                - Path=/api/v1/pagos/**
            
            - id: clientes-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/clientes/**

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: Microservicio Ventas
        url: /ventas/api-docs
      - name: Microservicio Locales
        url: /Local/api-docs
      - name: Microservicio Productos
        url: /producto/api-docs
      - name: Microservicio Clientes
        url: /cliente/api-docs
  api-docs:
    enabled: true